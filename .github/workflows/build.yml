name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "MP-Ostatki" --hidden-import=customtkinter --hidden-import=openpyxl --hidden-import=requests --hidden-import=asyncio main.py

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: MP-Ostatki-Windows
        path: dist/MP-Ostatki.exe